name: Validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/QuantaCandle.slnx

      - name: Build solution (Release)
        run: dotnet build src/QuantaCandle.slnx --configuration Release --no-restore

      - name: Run tests (Release)
        run: dotnet test src/QuantaCandle.slnx --configuration Release --no-build

      - name: Build Docker image (no push)
        run: docker build -f Dockerfile .
